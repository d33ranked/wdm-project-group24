name: ddm-project-group20

services:
  api-gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    image: gateway:latest
    restart: on-failure
    deploy:
      replicas: ${GATEWAY_REPLICAS:-1}
    expose:
      - "8000"
    env_file:
      - env/bus.env
      - env/sentinel.env
    environment:
      - REQUEST_TIMEOUT_MS=30000
    depends_on:
      redis-bus:
        condition: service_healthy
      sentinel-1:
        condition: service_healthy
      sentinel-2:
        condition: service_healthy
      sentinel-3:
        condition: service_healthy
      order-service:
        condition: service_started
      stock-service:
        condition: service_started
      payment-service:
        condition: service_started

  nginx:
    image: nginx:1.25-bookworm
    volumes:
      - ./${NGINX_CONF:-gateway_nginx_saga.conf}:/etc/nginx/nginx.conf:ro
    ports:
      - "8000:80"
    depends_on:
      - api-gateway
      - order-service
      - stock-service
      - payment-service

  order-service:
    build:
      context: .
      dockerfile: order/Dockerfile
    image: order:latest
    restart: on-failure
    deploy:
      replicas: ${ORDER_REPLICAS:-2}
    environment:
      - TRANSACTION_MODE=${TRANSACTION_MODE:-SAGA}
      - STOCK_SERVICE_URL=http://stock-service:5000
      - REDIS_MAX_CONNECTIONS=${REDIS_MAX_CONNECTIONS:-6000}
      - STREAM_BATCH_SIZE=${STREAM_BATCH_SIZE:-500}
    command: gunicorn -k gevent -b 0.0.0.0:5000 -w 1 --worker-connections 6000 --timeout 30 --log-level=info app:app
    env_file:
      - env/order_redis.env
      - env/bus.env
      - env/sentinel.env
    depends_on:
      redis-order:
        condition: service_healthy
      redis-bus:
        condition: service_healthy
      sentinel-1:
        condition: service_healthy
      sentinel-2:
        condition: service_healthy
      sentinel-3:
        condition: service_healthy

  redis-order:
    image: redis:7-alpine
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory-policy noeviction
      --maxclients 7000
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 15
      start_period: 3s

  stock-service:
    build:
      context: .
      dockerfile: stock/Dockerfile
    image: stock:latest
    restart: on-failure
    deploy:
      replicas: ${STOCK_REPLICAS:-2}
    environment:
      - TRANSACTION_MODE=${TRANSACTION_MODE:-SAGA}
      - REDIS_MAX_CONNECTIONS=${REDIS_MAX_CONNECTIONS:-6000}
      - STREAM_BATCH_SIZE=${STREAM_BATCH_SIZE:-500}
    command: gunicorn -k gevent -b 0.0.0.0:5000 -w 1 --worker-connections 6000 --timeout 30 --log-level=info app:app
    env_file:
      - env/stock_redis.env
      - env/bus.env
      - env/sentinel.env
    depends_on:
      redis-stock:
        condition: service_healthy
      redis-bus:
        condition: service_healthy
      sentinel-1:
        condition: service_healthy
      sentinel-2:
        condition: service_healthy
      sentinel-3:
        condition: service_healthy

  redis-stock:
    image: redis:7-alpine
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory-policy noeviction
      --maxclients 7000
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 15
      start_period: 3s

  payment-service:
    build:
      context: .
      dockerfile: payment/Dockerfile
    image: payment:latest
    restart: on-failure
    deploy:
      replicas: ${PAYMENT_REPLICAS:-2}
    environment:
      - TRANSACTION_MODE=${TRANSACTION_MODE:-SAGA}
      - REDIS_MAX_CONNECTIONS=${REDIS_MAX_CONNECTIONS:-6000}
      - STREAM_BATCH_SIZE=${STREAM_BATCH_SIZE:-500}
    command: gunicorn -k gevent -b 0.0.0.0:5000 -w 1 --worker-connections 6000 --timeout 30 --log-level=info app:app
    env_file:
      - env/payment_redis.env
      - env/bus.env
      - env/sentinel.env
    depends_on:
      redis-payment:
        condition: service_healthy
      redis-bus:
        condition: service_healthy
      sentinel-1:
        condition: service_healthy
      sentinel-2:
        condition: service_healthy
      sentinel-3:
        condition: service_healthy

  redis-payment:
    image: redis:7-alpine
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory-policy noeviction
      --maxclients 7000
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 15
      start_period: 3s

  # shared message bus — all SAGA streams live here
  # kept separate from service storage so killing a service's Redis
  # does not drop in-flight messages
  redis-bus:
    image: redis:7-alpine
    command: >
      redis-server
      --appendonly no
      --maxmemory-policy noeviction
      --maxclients 20000
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 15
      start_period: 3s

  redis-order-replica:
    image: redis:7-alpine
    restart: on-failure
    command: >
      redis-server
      --replicaof redis-order 6379
      --appendonly yes
      --appendfsync everysec
      --maxmemory-policy noeviction
      --maxclients 7000
    depends_on:
      redis-order:
        condition: service_healthy

  redis-stock-replica:
    image: redis:7-alpine
    restart: on-failure
    command: >
      redis-server
      --replicaof redis-stock 6379
      --appendonly yes
      --appendfsync everysec
      --maxmemory-policy noeviction
      --maxclients 7000
    depends_on:
      redis-stock:
        condition: service_healthy

  redis-payment-replica:
    image: redis:7-alpine
    restart: on-failure
    command: >
      redis-server
      --replicaof redis-payment 6379
      --appendonly yes
      --appendfsync everysec
      --maxmemory-policy noeviction
      --maxclients 7000
    depends_on:
      redis-payment:
        condition: service_healthy

  redis-bus-replica:
    image: redis:7-alpine
    restart: on-failure
    command: >
      redis-server
      --replicaof redis-bus 6379
      --appendonly no
      --maxmemory-policy noeviction
      --maxclients 20000
    depends_on:
      redis-bus:
        condition: service_healthy

  sentinel-1:
    image: redis:7-alpine
    restart: on-failure
    volumes:
      - ./sentinel.conf:/etc/redis/sentinel.conf.template:ro
    command: >
      sh -c "cp /etc/redis/sentinel.conf.template /tmp/sentinel.conf
      && redis-sentinel /tmp/sentinel.conf"
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "26379", "ping"]
      interval: 2s
      timeout: 3s
      retries: 15
      start_period: 5s
    depends_on:
      redis-order:
        condition: service_healthy
      redis-stock:
        condition: service_healthy
      redis-payment:
        condition: service_healthy
      redis-bus:
        condition: service_healthy

  sentinel-2:
    image: redis:7-alpine
    restart: on-failure
    volumes:
      - ./sentinel.conf:/etc/redis/sentinel.conf.template:ro
    command: >
      sh -c "cp /etc/redis/sentinel.conf.template /tmp/sentinel.conf
      && redis-sentinel /tmp/sentinel.conf"
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "26379", "ping"]
      interval: 2s
      timeout: 3s
      retries: 15
      start_period: 5s
    depends_on:
      redis-order:
        condition: service_healthy
      redis-stock:
        condition: service_healthy
      redis-payment:
        condition: service_healthy
      redis-bus:
        condition: service_healthy

  sentinel-3:
    image: redis:7-alpine
    restart: on-failure
    volumes:
      - ./sentinel.conf:/etc/redis/sentinel.conf.template:ro
    command: >
      sh -c "cp /etc/redis/sentinel.conf.template /tmp/sentinel.conf
      && redis-sentinel /tmp/sentinel.conf"
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "26379", "ping"]
      interval: 2s
      timeout: 3s
      retries: 15
      start_period: 5s
    depends_on:
      redis-order:
        condition: service_healthy
      redis-stock:
        condition: service_healthy
      redis-payment:
        condition: service_healthy
      redis-bus:
        condition: service_healthy