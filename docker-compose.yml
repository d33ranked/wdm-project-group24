services:
  api-gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    image: gateway:latest
    restart: on-failure
    ports:
      - "8001:8000"
    env_file:
      - env/bus.env
    environment:
      - REQUEST_TIMEOUT_MS=30000
    depends_on:
      redis-bus:
        condition: service_healthy
      order-service:
        condition: service_started
      stock-service:
        condition: service_started
      payment-service:
        condition: service_started

  nginx:
    image: nginx:1.25-bookworm
    volumes:
      - ./gateway_nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8000:80"
    depends_on:
      - order-service
      - stock-service
      - payment-service

  order-service:
    build:
      context: .
      dockerfile: order/Dockerfile
    image: order:latest
    restart: on-failure
    environment:
      - TRANSACTION_MODE=TPC
      - GATEWAY_URL=http://nginx:80
      - STOCK_SERVICE_URL=http://stock-service:5000
    command: gunicorn -k gevent -b 0.0.0.0:5000 -w 1 --timeout 30 --log-level=info app:app
    env_file:
      - env/order_redis.env
      - env/bus.env
    depends_on:
      redis-order:
        condition: service_healthy
      redis-bus:
        condition: service_healthy

  redis-order:
    image: redis:7-alpine
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory-policy noeviction
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 15
      start_period: 3s

  stock-service:
    build:
      context: .
      dockerfile: stock/Dockerfile
    image: stock:latest
    restart: on-failure
    environment:
      - TRANSACTION_MODE=TPC
    command: gunicorn -k gevent -b 0.0.0.0:5000 -w 1 --timeout 30 --log-level=info app:app
    env_file:
      - env/stock_redis.env
      - env/bus.env
    depends_on:
      redis-stock:
        condition: service_healthy
      redis-bus:
        condition: service_healthy

  redis-stock:
    image: redis:7-alpine
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory-policy noeviction
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 15
      start_period: 3s

  payment-service:
    build:
      context: .
      dockerfile: payment/Dockerfile
    image: payment:latest
    restart: on-failure
    environment:
      - TRANSACTION_MODE=TPC
    command: gunicorn -k gevent -b 0.0.0.0:5000 -w 1 --timeout 30 --log-level=info app:app
    env_file:
      - env/payment_redis.env
      - env/bus.env
    depends_on:
      redis-payment:
        condition: service_healthy
      redis-bus:
        condition: service_healthy

  redis-payment:
    image: redis:7-alpine
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory-policy noeviction
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 15
      start_period: 3s

  # shared message bus — all SAGA streams live here
  # kept separate from service storage so killing a service's Redis
  # does not drop in-flight messages
  redis-bus:
    image: redis:7-alpine
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory-policy noeviction
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 15
      start_period: 3s
