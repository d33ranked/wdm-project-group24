version: "3"
services:

  gateway:
    image: nginx:1.25-bookworm
    volumes:
      - ./gateway_nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8000:80"
    depends_on:
      - order-service
      - stock-service
      - payment-service

  order-db:
    image: postgres:17-bookworm
    environment:
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=order
    command: ["postgres", "-c", "max_prepared_transactions=100"]
    volumes:
      - order_data:/var/lib/postgresql/data

  order-service:
    build:
      context: .
      dockerfile: ./order/Dockerfile
    image: order:latest
    environment:
      - GATEWAY_URL=http://gateway:80
      - ENABLE_2PC=false
      - ENABLE_GRPC=false
    command: gunicorn -b 0.0.0.0:5000 -w 2 --timeout 30 --log-level=info app:app
    env_file:
      - ./env/order_postgres.env
    depends_on:
      - order-db

  stock-db:
    image: postgres:17-bookworm
    environment:
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=stock
    command: ["postgres", "-c", "max_prepared_transactions=100"]
    volumes:
      - stock_data:/var/lib/postgresql/data

  stock-service:
    build:
      context: .
      dockerfile: ./stock/Dockerfile
    image: stock:latest
    command: gunicorn -b 0.0.0.0:5000 -w 2 --timeout 30 --log-level=info app:app
    env_file:
      - ./env/stock_postgres.env
    depends_on:
      - stock-db

  # --- PAYMENT MICROSERVICE ---
  payment-db:
    image: postgres:17-bookworm
    environment:
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=payment
    command: ["postgres", "-c", "max_prepared_transactions=100"]
    volumes:
      - payment_data:/var/lib/postgresql/data

  payment-service:
    build:
      context: .
      dockerfile: ./payment/Dockerfile
    image: payment:latest
    command: gunicorn -b 0.0.0.0:5000 -w 2 --timeout 30 --log-level=info app:app
    env_file:
      - ./env/payment_postgres.env
    depends_on:
      - payment-db


volumes:
  order_data:
  stock_data:
  payment_data:
