services:
  gateway:
    image: nginx:1.25-bookworm
    volumes:
      - ./gateway_nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8000:80"
    depends_on:
      - order-service
      - stock-service
      - payment-service

  order-service:
    build: ./order
    image: order:latest
    environment:
      - TRANSACTION_MODE=TPC
      - GATEWAY_URL=http://gateway:80
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - POSTGRES_HOSTS=order-db-1,order-db-2
      - PATRONI_PORT=8008
      - POSTGRES_PORT=5432
      - POSTGRES_DB=orders
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
    command: gunicorn -k gevent -b 0.0.0.0:5000 -w 2 --timeout 300 --log-level=info app:app
    depends_on:
      - order-db-1
      - order-db-2
      - kafka

  order-db-1:
    build: ./patroni
    image: patroni:latest
    environment:
      - PATRONI_NAME=order-db-1
    volumes:
      - ./patroni/patroni-order.yml:/etc/patroni/patroni.yml:ro
      - ./order/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./order/post_bootstrap.sh:/docker-entrypoint-initdb.d/post_bootstrap.sh:ro

    depends_on:
      - etcd1
      - etcd2
      - etcd3

  order-db-2:
    build: ./patroni
    image: patroni:latest
    environment:
      - PATRONI_NAME=order-db-2
    volumes:
      - ./patroni/patroni-order.yml:/etc/patroni/patroni.yml:ro
      - ./order/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./order/post_bootstrap.sh:/docker-entrypoint-initdb.d/post_bootstrap.sh:ro
    depends_on:
      - etcd1
      - etcd2
      - etcd3

  stock-service:
    build: ./stock
    image: stock:latest
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - POSTGRES_HOSTS=stock-db-1,stock-db-2
      - PATRONI_PORT=8008
      - POSTGRES_PORT=5432
      - POSTGRES_DB=stock
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
    command: gunicorn -k gevent -b 0.0.0.0:5000 -w 2 --timeout 300 --log-level=info app:app
    depends_on:
      - stock-db-1
      - stock-db-2
      - kafka

  stock-db-1:
    build: ./patroni
    image: patroni:latest
    environment:
      - PATRONI_NAME=stock-db-1
    volumes:
      - ./patroni/patroni-stock.yml:/etc/patroni/patroni.yml:ro
      - ./stock/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./stock/post_bootstrap.sh:/docker-entrypoint-initdb.d/post_bootstrap.sh:ro
    depends_on:
      - etcd1
      - etcd2
      - etcd3

  stock-db-2:
    build: ./patroni
    image: patroni:latest
    environment:
      - PATRONI_NAME=stock-db-2
    volumes:
      - ./patroni/patroni-stock.yml:/etc/patroni/patroni.yml:ro
      - ./stock/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./stock/post_bootstrap.sh:/docker-entrypoint-initdb.d/post_bootstrap.sh:ro
    depends_on:
      - etcd1
      - etcd2
      - etcd3

  payment-service:
    build: ./payment
    image: payment:latest
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - POSTGRES_HOSTS=payment-db-1,payment-db-2
      - PATRONI_PORT=8008
      - POSTGRES_PORT=5432
      - POSTGRES_DB=payments
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
    command: gunicorn -k gevent -b 0.0.0.0:5000 -w 2 --timeout 300 --log-level=info app:app
    depends_on:
      - payment-db-1
      - payment-db-2
      - kafka

  payment-db-1:
    build: ./patroni
    image: patroni:latest
    environment:
      - PATRONI_NAME=payment-db-1
    volumes:
      - ./patroni/patroni-payment.yml:/etc/patroni/patroni.yml:ro
      - ./payment/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./payment/post_bootstrap.sh:/docker-entrypoint-initdb.d/post_bootstrap.sh:ro
    depends_on:
      - etcd1
      - etcd2
      - etcd3

  payment-db-2:
    build: ./patroni
    image: patroni:latest
    environment:
      - PATRONI_NAME=payment-db-2
    volumes:
      - ./patroni/patroni-payment.yml:/etc/patroni/patroni.yml:ro
      - ./payment/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./payment/post_bootstrap.sh:/docker-entrypoint-initdb.d/post_bootstrap.sh:ro
    depends_on:
      - etcd1
      - etcd2
      - etcd3

  # etcd cluster for Patroni leader election
  etcd1:
    image: quay.io/coreos/etcd:v3.5.12
    environment:
      - ETCD_NAME=etcd1
      - ETCD_INITIAL_ADVERTISE_PEER_URLS=http://etcd1:2380
      - ETCD_LISTEN_PEER_URLS=http://0.0.0.0:2380
      - ETCD_LISTEN_CLIENT_URLS=http://0.0.0.0:2379
      - ETCD_ADVERTISE_CLIENT_URLS=http://etcd1:2379
      - ETCD_INITIAL_CLUSTER=etcd1=http://etcd1:2380,etcd2=http://etcd2:2380,etcd3=http://etcd3:2380
      - ETCD_INITIAL_CLUSTER_STATE=new
      - ETCD_INITIAL_CLUSTER_TOKEN=etcd-cluster

  etcd2:
    image: quay.io/coreos/etcd:v3.5.12
    environment:
      - ETCD_NAME=etcd2
      - ETCD_INITIAL_ADVERTISE_PEER_URLS=http://etcd2:2380
      - ETCD_LISTEN_PEER_URLS=http://0.0.0.0:2380
      - ETCD_LISTEN_CLIENT_URLS=http://0.0.0.0:2379
      - ETCD_ADVERTISE_CLIENT_URLS=http://etcd2:2379
      - ETCD_INITIAL_CLUSTER=etcd1=http://etcd1:2380,etcd2=http://etcd2:2380,etcd3=http://etcd3:2380
      - ETCD_INITIAL_CLUSTER_STATE=new
      - ETCD_INITIAL_CLUSTER_TOKEN=etcd-cluster

  etcd3:
    image: quay.io/coreos/etcd:v3.5.12
    environment:
      - ETCD_NAME=etcd3
      - ETCD_INITIAL_ADVERTISE_PEER_URLS=http://etcd3:2380
      - ETCD_LISTEN_PEER_URLS=http://0.0.0.0:2380
      - ETCD_LISTEN_CLIENT_URLS=http://0.0.0.0:2379
      - ETCD_ADVERTISE_CLIENT_URLS=http://etcd3:2379
      - ETCD_INITIAL_CLUSTER=etcd1=http://etcd1:2380,etcd2=http://etcd2:2380,etcd3=http://etcd3:2380
      - ETCD_INITIAL_CLUSTER_STATE=new
      - ETCD_INITIAL_CLUSTER_TOKEN=etcd-cluster

  kafka:
    image: apache/kafka:latest
    ports:
      - "9092:9092"
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
      - ALLOW_PLAINTEXT_LISTENER=yes

      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_NUM_PARTITIONS=3
    env_file:
      - env/kafka.env
    volumes:
      - kafka_data:/apache/kafka

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    ports:
      - "8080:8080"
    depends_on:
      - kafka
    environment:
      - KAFKA_CLUSTERS_0_NAME=local
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:9092

volumes:
  kafka_data:
