services:

  gateway:
    image: nginx:1.25-bookworm
    volumes:
      - ./gateway_nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8000:80"
    depends_on:
      order-service:
        condition: service_healthy
      stock-service:
        condition: service_healthy
      payment-service:
        condition: service_healthy

  order-service:
    build: ./order
    image: order:latest
    environment:
      - GATEWAY_URL=http://gateway:80
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    command: gunicorn -b 0.0.0.0:5000 -w 1 --timeout 30 --log-level=info app:app
    env_file:
      - env/order_redis.env
      - env/kafka.env
    depends_on:
      order-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/ready"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 30s

  order-db:
    image: redis:7.2-bookworm
    command: redis-server --requirepass redis --maxmemory 512mb
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "redis", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  stock-service:
    build: ./stock
    image: stock:latest
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    command: gunicorn -b 0.0.0.0:5000 -w 2 --timeout 30 --log-level=info app:app
    env_file:
      - env/stock_redis.env
      - env/kafka.env
    depends_on:
      stock-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/ready"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 30s

  stock-db:
    image: redis:7.2-bookworm
    command: redis-server --requirepass redis --maxmemory 512mb
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "redis", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  payment-service:
    build: ./payment
    image: payment:latest
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    command: gunicorn -b 0.0.0.0:5000 -w 2 --timeout 30 --log-level=info app:app
    env_file:
      - env/payment_redis.env
      - env/kafka.env
    depends_on:
      payment-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/ready"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 30s

  payment-db:
    image: redis:7.2-bookworm
    command: redis-server --requirepass redis --maxmemory 512mb
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "redis", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  kafka:
    image: apache/kafka:latest
    ports:
      - "9092:9092"
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
      - ALLOW_PLAINTEXT_LISTENER=yes

      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_NUM_PARTITIONS=3
    env_file:
      - env/kafka.env
    volumes:
      - kafka_data:/apache/kafka
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9092"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 60s

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    ports:
      - "8080:8080"
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      - KAFKA_CLUSTERS_0_NAME=local
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:9092

volumes:
  kafka_data:
