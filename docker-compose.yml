services:
  gateway:
    image: nginx:1.25-bookworm
    volumes:
      - ./gateway_nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8000:80"
    depends_on:
      order-service:
        condition: service_started
      stock-service:
        condition: service_started
      payment-service:
        condition: service_started

  order-db:
    image: postgres:17-bookworm
    environment:
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=order
    command: ["postgres", "-c", "max_prepared_transactions=100"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10


  order-service:
    build:
      context: .
      dockerfile: ./order/Dockerfile
    image: order:latest
    environment:
      - GATEWAY_URL=http://gateway:80
      - ENABLE_2PC=true
      - ENABLE_GRPC=false
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - POSTGRES_HOST=order-db
      - POSTGRES_DB=order
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_PORT=5432
    command: gunicorn -b 0.0.0.0:5000 -w 2 --timeout 120 --log-level=info app:app
    depends_on:
      - order-db
      - stock-grpc  
      - payment-grpc 


  stock-db:
    image: postgres:17-bookworm
    environment:
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=stock
    command: ["postgres", "-c", "max_prepared_transactions=100"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10


  stock-service:
    build:
      context: .
      dockerfile: ./stock/Dockerfile
    image: stock:latest
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - POSTGRES_HOST=stock-db
      - POSTGRES_DB=stock
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_PORT=5432
    command: gunicorn -b 0.0.0.0:5000 -w 2 --timeout 120 --log-level=info app:app
    depends_on:
      stock-db:
        condition: service_healthy
      kafka:
        condition: service_started

  stock-grpc:
    build:
      context: . 
      dockerfile: ./stock/Dockerfile
    command: python grpc_server.py
    env_file:
      - ./env/stock_postgres.env
    depends_on:
      - stock-db
    expose:
      - "50052"

  # --- PAYMENT MICROSERVICE ---
  payment-db:
    image: postgres:17-bookworm
    environment:
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=payment
    command: ["postgres", "-c", "max_prepared_transactions=100"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  payment-service:
    build:
      context: .
      dockerfile: ./payment/Dockerfile
    image: payment:latest
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - POSTGRES_HOST=payment-db
      - POSTGRES_DB=payment
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_PORT=5432
    command: gunicorn -b 0.0.0.0:5000 -w 2 --timeout 120 --log-level=info app:app
    depends_on:
      payment-db:
        condition: service_healthy
      kafka:
        condition: service_started

  payment-grpc:
    build:
      context: .  
      dockerfile: ./payment/Dockerfile
    command: python grpc_server.py
    env_file:
      - ./env/payment_postgres.env
    depends_on:
      - stock-db
    expose:
      - "50051"


  kafka:
    image: apache/kafka:latest
    ports:
      - "9092:9092"
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
      - ALLOW_PLAINTEXT_LISTENER=yes

      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_NUM_PARTITIONS=3

      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - TOPIC_ORDER_CREATED=order-created
      - TOPIC_STOCK_RESERVED=stock-reserved
      - TOPIC_PAYMENT_COMPLETED=payment-completed
      - GROUP_ORDER=order-service
      - GROUP_STOCK=stock-service
      - GROUP_PAYMENT=payment-service

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    ports:
      - "8080:8080"
    depends_on:
      - kafka
    environment:
      - KAFKA_CLUSTERS_0_NAME=local
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:9092

volumes:
  kafka_data:

