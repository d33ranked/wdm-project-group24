services:
  api-gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    image: gateway:latest
    restart: on-failure
    ports:
      - "8001:8000"
    env_file:
      - env/kafka.env
    environment:
      - REQUEST_TIMEOUT_MS=30000
      - KAFKA_BOOTSTRAP_SERVERS=kafka-external:9092
    depends_on:
      - kafka-external
      - order-service
      - stock-service
      - payment-service

  nginx:
    image: nginx:1.25-bookworm
    volumes:
      - ./gateway_nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8000:80"
    depends_on:
      - order-service
      - stock-service
      - payment-service

  order-service:
    build:
      context: .
      dockerfile: order/Dockerfile
    image: order:latest
    restart: on-failure
    environment:
      - TRANSACTION_MODE=TPC
      - GATEWAY_URL=http://nginx:80
      - STOCK_SERVICE_URL=http://stock-service:5000
      - KAFKA_BOOTSTRAP_SERVERS=kafka-external:9092
      - INTERNAL_KAFKA_BOOTSTRAP_SERVERS=kafka-internal:9092
    command: gunicorn -k gevent -b 0.0.0.0:5000 -w 4 --timeout 30 --log-level=info app:app
    env_file:
      - env/order_db.env
    depends_on:
      - order-db
      - kafka-external
      - kafka-internal

  order-db:
    image: postgres
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=orders
    volumes:
      - ./order/init.sql:/docker-entrypoint-initdb.d/init.sql

  stock-service:
    build:
      context: .
      dockerfile: stock/Dockerfile
    image: stock:latest
    restart: on-failure
    environment:
      - TRANSACTION_MODE=TPC
      - KAFKA_BOOTSTRAP_SERVERS=kafka-external:9092
      - INTERNAL_KAFKA_BOOTSTRAP_SERVERS=kafka-internal:9092
    command: gunicorn -k gevent -b 0.0.0.0:5000 -w 4 --timeout 30 --log-level=info app:app
    env_file:
      - env/stock_db.env
    depends_on:
      - stock-db
      - kafka-external
      - kafka-internal

  stock-db:
    image: postgres
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=stock
    volumes:
      - ./stock/init.sql:/docker-entrypoint-initdb.d/init.sql

  payment-service:
    build:
      context: .
      dockerfile: payment/Dockerfile
    image: payment:latest
    restart: on-failure
    environment:
      - TRANSACTION_MODE=TPC
      - KAFKA_BOOTSTRAP_SERVERS=kafka-external:9092
      - INTERNAL_KAFKA_BOOTSTRAP_SERVERS=kafka-internal:9092
    command: gunicorn -k gevent -b 0.0.0.0:5000 -w 4 --timeout 30 --log-level=info app:app
    env_file:
      - env/payment_db.env
    depends_on:
      - payment-db
      - kafka-external
      - kafka-internal

  payment-db:
    image: postgres
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=payments
    volumes:
      - ./payment/init.sql:/docker-entrypoint-initdb.d/init.sql

  kafka-external:
    image: apache/kafka:latest
    ports:
      - "9092:9092"
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka-external:9092
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka-external:9093
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
      - ALLOW_PLAINTEXT_LISTENER=yes
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_NUM_PARTITIONS=3
    env_file:
      - env/kafka.env
    volumes:
      - kafka_data:/apache/kafka

  kafka-internal:
    image: apache/kafka:latest
    ports:
      - "9093:9092"
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka-internal:9092
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka-internal:9093
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
      - ALLOW_PLAINTEXT_LISTENER=yes
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_NUM_PARTITIONS=3
    volumes:
      - kafka_internal_data:/apache/kafka

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    ports:
      - "8080:8080"
    depends_on:
      - kafka-external
      - kafka-internal
    environment:
      - KAFKA_CLUSTERS_0_NAME=external
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka-external:9092
      - KAFKA_CLUSTERS_1_NAME=internal
      - KAFKA_CLUSTERS_1_BOOTSTRAPSERVERS=kafka-internal:9092

volumes:
  kafka_data:
  kafka_internal_data:
